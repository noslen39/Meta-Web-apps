<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=600, height=600, initial-scale=1" />
  <title>TicTacToe!</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="screen">
    <header>
      <h1>TicTacToe!</h1>
      <p id="status">X goes first</p>
    </header>

    <section id="board" class="board" aria-label="Tic-Tac-Toe board">
      <button class="cell focusable" data-index="0"></button>
      <button class="cell focusable" data-index="1"></button>
      <button class="cell focusable" data-index="2"></button>
      <button class="cell focusable" data-index="3"></button>
      <button class="cell focusable" data-index="4"></button>
      <button class="cell focusable" data-index="5"></button>
      <button class="cell focusable" data-index="6"></button>
      <button class="cell focusable" data-index="7"></button>
      <button class="cell focusable" data-index="8"></button>
    </section>

    <footer>
      <button id="resetBtn" class="reset focusable">Reset</button>
      <p class="hint">Swipe to move · Pinch/Enter select</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
